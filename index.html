<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keeta BD Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--blue:#00d4ff;--red:#FF5252;--yellow:#FFD740;--green:#00E676;--bg:#0a0e1a;--card:#111827;--text:#e8f4ff;--muted:#8bacc8;--sidebar-w:200px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.sidebar{position:fixed;left:0;top:0;width:var(--sidebar-w);height:100vh;background:linear-gradient(180deg,#0d1321,#0a0e1a);border-right:1px solid rgba(0,212,255,0.12);display:flex;flex-direction:column;z-index:100;padding:20px 0}
.sidebar-logo{padding:0 16px 20px;border-bottom:1px solid rgba(0,212,255,0.1);margin-bottom:16px}
.sidebar-logo h2{font-size:16px;font-weight:900;color:var(--blue);display:flex;align-items:center;gap:8px}
.sidebar-nav{flex:1;padding:0 12px}
.sidebar-nav a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:600;transition:all 0.2s;margin-bottom:4px;cursor:pointer}
.sidebar-nav a:hover,.sidebar-nav a.active{background:rgba(0,212,255,0.08);color:var(--blue)}
.sidebar-cron{padding:12px 16px;border-top:1px solid rgba(0,212,255,0.1);margin-top:auto}
.sidebar-cron h4{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.cron-item{font-size:11px;color:var(--muted);padding:4px 0;display:flex;align-items:center;gap:6px}
.cron-item .dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.sidebar-footer{padding:12px 16px;border-top:1px solid rgba(0,212,255,0.1);font-size:11px;color:rgba(139,172,200,0.5);text-align:center}
.main{margin-left:var(--sidebar-w);padding:24px 32px;min-height:100vh}
.header{margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid rgba(0,212,255,0.1)}
.header h1{font-size:28px;font-weight:900;margin-bottom:4px}
.header h1 span{color:var(--blue)}
.header-sub{font-size:12px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.header-info{font-size:13px;color:var(--muted)}
.header-info .data-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(0,230,118,0.12);color:var(--green);padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;margin-left:8px}
.card{background:var(--card);border-radius:16px;border:1.5px solid rgba(0,212,255,0.18);padding:20px;margin-bottom:20px}
.card-title{font-size:14px;font-weight:700;color:var(--blue);margin-bottom:16px;text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:8px}
.stats-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:var(--card);border-radius:16px;border:1.5px solid rgba(0,212,255,0.18);padding:16px;text-align:center}
.stat-label{font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:600}
.stat-value{font-size:28px;font-weight:900;color:var(--blue)}
.stat-value.red{color:var(--red)}
.stat-value.green{color:var(--green)}
.stat-value.yellow{color:var(--yellow)}
.stat-sub{font-size:10px;color:var(--muted);margin-top:4px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px}
.chart-container{position:relative;height:180px;margin-top:12px}
.chart-bar-group{display:flex;align-items:flex-end;justify-content:space-around;height:150px;padding:0 8px}
.chart-bar-wrapper{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.chart-bar{width:28px;border-radius:4px 4px 0 0;transition:height 0.4s ease;min-height:2px}
.chart-bar.blue{background:linear-gradient(180deg,var(--blue),rgba(0,212,255,0.5))}
.chart-bar.green{background:linear-gradient(180deg,var(--green),rgba(0,230,118,0.5))}
.chart-bar.yellow{background:linear-gradient(180deg,var(--yellow),rgba(255,215,64,0.5))}
.chart-label{font-size:10px;color:var(--muted);font-weight:600}
.chart-val{font-size:10px;color:var(--text);font-weight:700}
.pct-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid rgba(0,212,255,0.06)}
.pct-row:last-child{border-bottom:none}
.pct-label{font-size:12px;color:var(--muted);width:160px;flex-shrink:0}
.pct-bar-bg{flex:1;height:12px;background:rgba(255,255,255,0.05);border-radius:6px;overflow:hidden}
.pct-bar-fill{height:100%;border-radius:6px;transition:width 0.6s ease}
.pct-value{font-size:12px;font-weight:800;width:60px;text-align:right;flex-shrink:0}
.timeline{position:relative;padding-left:24px}
.timeline::before{content:'';position:absolute;left:8px;top:4px;bottom:4px;width:2px;background:rgba(0,212,255,0.15)}
.timeline-item{position:relative;padding:8px 0;font-size:12px;line-height:1.5}
.timeline-item::before{content:'';position:absolute;left:-20px;top:14px;width:10px;height:10px;border-radius:50%;background:var(--green);border:2px solid var(--bg)}
.timeline-item.warning::before{background:var(--yellow)}
.timeline-time{color:var(--muted);font-weight:700;margin-right:6px}
.timeline-source{color:var(--blue);font-weight:700;margin-right:6px}
.task-list{list-style:none}
.task-item{padding:10px 12px;border-radius:8px;margin-bottom:8px;font-size:12px;border-left:3px solid var(--red);background:rgba(255,82,82,0.05)}
.task-item.yellow{border-left-color:var(--yellow);background:rgba(255,215,64,0.05)}
.task-priority{font-weight:900;margin-right:4px}
.task-assignee{color:var(--muted);font-size:11px;margin-top:2px}
.task-status{display:inline-block;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:700;margin-left:6px}
.task-status.critical{background:rgba(255,82,82,0.2);color:var(--red)}
.task-status.blocked{background:rgba(255,82,82,0.2);color:var(--red)}
.task-status.pending{background:rgba(255,215,64,0.2);color:var(--yellow)}
.task-status.running{background:rgba(0,230,118,0.2);color:var(--green)}
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{text-align:left;padding:10px 12px;color:var(--muted);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid rgba(0,212,255,0.1)}
.data-table td{padding:10px 12px;border-bottom:1px solid rgba(0,212,255,0.05)}
.data-table tr:hover{background:rgba(0,212,255,0.03)}
.row-green{background:rgba(0,230,118,0.06)!important}
.row-yellow{background:rgba(255,215,64,0.06)!important}
.row-red{background:rgba(255,82,82,0.06)!important}
.status-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px}
.status-badge.green{background:rgba(0,230,118,0.15);color:var(--green)}
.status-badge.yellow{background:rgba(255,215,64,0.15);color:var(--yellow)}
.status-badge.red{background:rgba(255,82,82,0.15);color:var(--red)}
.team-section{margin-bottom:24px}
.team-section-title{font-size:14px;font-weight:800;margin-bottom:12px;padding-left:12px;border-left:3px solid var(--green)}
.team-section-title.fc{border-left-color:var(--blue)}
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}
.member-card{background:var(--card);border-radius:16px;border:1.5px solid rgba(0,212,255,0.12);padding:16px;text-align:center;transition:transform 0.2s,box-shadow 0.2s}
.member-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,212,255,0.12)}
.member-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;margin:0 auto 8px}
.member-name{font-size:11px;font-weight:800;margin-bottom:3px}
.member-team-badge{display:inline-block;font-size:10px;font-weight:800;padding:2px 8px;border-radius:4px;margin-bottom:6px}
.badge-fd{background:rgba(0,230,118,0.15);color:var(--green)}
.badge-fc{background:rgba(0,212,255,0.15);color:var(--blue)}
.member-score{font-size:10px;color:var(--muted);margin-bottom:6px}
.member-detail{font-size:10px;color:var(--muted);margin-bottom:4px}
.progress-bar{width:100%;height:6px;border-radius:3px;background:rgba(255,255,255,0.05);overflow:hidden;margin-bottom:4px}
.progress-fill{height:100%;border-radius:3px;transition:width 0.6s ease}
.progress-fill.green{background:linear-gradient(90deg,#00E676,#69F0AE)}
.progress-fill.yellow{background:linear-gradient(90deg,#FFD740,#FFAB40)}
.progress-fill.red{background:linear-gradient(90deg,#FF5252,#FF8A80)}
.member-status{font-size:10px;font-weight:700}
.sparkline{display:flex;align-items:flex-end;gap:2px;height:30px;margin-top:8px}
.sparkline-bar{flex:1;border-radius:2px 2px 0 0;background:var(--blue);opacity:0.6;transition:height 0.3s}
.sparkline-bar:last-child{opacity:1}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:rgba(0,212,255,0.2);border-radius:3px}
@media(max-width:1200px){.stats-grid{grid-template-columns:repeat(3,1fr)}.two-col,.three-col{grid-template-columns:1fr}}
</style>
</head>
<body>
<aside class="sidebar">
<div class="sidebar-logo"><h2>🚀 Keeta BD HQ</h2></div>
<nav class="sidebar-nav">
<a class="active" data-section="overview">📊 Overview</a>
<a data-section="competition">🏆 Leaderboard</a>
<a data-section="team">👥 BD Details</a>
<a data-section="promo">💰 Promo Coverage</a>
<a data-section="tasks">📋 Priority Tasks</a>
</nav>
<div class="sidebar-cron">
<h4>Data Source</h4>
<div class="cron-item"><span class="dot"></span> kdata API Auto-pull</div>
<div class="cron-item"><span class="dot"></span> Dataset 60041382</div>
</div>
<div class="sidebar-footer">v2.2 · Data-Driven</div>
</aside>
<main class="main" id="app"><div style="padding:40px;text-align:center;color:var(--muted)">Loading data...</div></main>
<script>
fetch('data.json').then(r=>r.json()).then(D=>{render(D)}).catch(e=>{document.getElementById('app').innerHTML='<p style="color:var(--red);padding:40px">Failed to load data.json: '+e.message+'</p>'});

function render(D){
var app=document.getElementById('app');
var h=D.hud,ov=D.overview,tr=D.trend,bds=D.bds,km=D.keyMerchants,tasks=D.tasks,log=D.log,comp=D.competition;

var gradients=['linear-gradient(135deg,#667eea,#764ba2)','linear-gradient(135deg,#f093fb,#f5576c)','linear-gradient(135deg,#4facfe,#00f2fe)','linear-gradient(135deg,#43e97b,#38f9d7)','linear-gradient(135deg,#fa709a,#fee140)','linear-gradient(135deg,#a18cd1,#fbc2eb)','linear-gradient(135deg,#fccb90,#d57eeb)','linear-gradient(135deg,#e0c3fc,#8ec5fc)','linear-gradient(135deg,#f5576c,#ff6f91)','linear-gradient(135deg,#96fbc4,#f9f586)','linear-gradient(135deg,#ff9a9e,#fad0c4)'];
function getGrad(n){var x=0;for(var i=0;i<n.length;i++)x=n.charCodeAt(i)+((x<<5)-x);return gradients[Math.abs(x)%gradients.length]}

var html='';

// Header
html+='<div class="header"><div class="header-sub">BD TEAM COMMAND CENTER</div><h1><span>Keeta BD</span> Command Center</h1><div class="header-info">Owner: Jaden <span class="data-badge">🟢 LIVE · Data as of '+D.dataDate+'</span></div></div>';

// ===== SECTION: OVERVIEW =====
html+='<section id="sec-overview">';

// Stats row
html+='<div class="stats-grid">';
var stats=[
{l:"Competition Points",v:h.totalPointsEarned,c:"blue"},
{l:"Active Shops (MTD)",v:ov.monthTotal.openShops.toLocaleString(),c:"blue"},
{l:"Transacting Shops (MTD)",v:ov.monthTotal.txnShops.toLocaleString(),c:"green"},
{l:"Orders MTD",v:ov.monthTotal.orders.toLocaleString(),c:"green"},
{l:"Discount Dish Coverage",v:ov.discountProductCoverage,c:"yellow"},
{l:"Days to Sprint",v:comp.daysLeft+" days",c:comp.daysLeft<=3?"red":"blue"}
];
for(var i=0;i<stats.length;i++){var s=stats[i];html+='<div class="stat-card"><div class="stat-label">'+s.l+'</div><div class="stat-value '+s.c+'">'+s.v+'</div></div>';}
html+='</div>';

// Trend chart + key metrics
html+='<div class="two-col">';

// Orders trend bar chart
html+='<div class="card"><div class="card-title">📈 Daily Orders — Last 7 Days</div><div class="chart-container"><div class="chart-bar-group">';
var maxOrd=0;for(var i=0;i<tr.length;i++){if(tr[i].orders>maxOrd)maxOrd=tr[i].orders}
for(var i=0;i<tr.length;i++){var t=tr[i];var ht=Math.round(t.orders/maxOrd*130);html+='<div class="chart-bar-wrapper"><div class="chart-val">'+Math.round(t.orders/1000*10)/10+'k</div><div class="chart-bar blue" style="height:'+ht+'px"></div><div class="chart-label">'+t.date+'</div></div>';}
html+='</div></div></div>';

// Promo coverage card
html+='<div class="card"><div class="card-title">💰 Promotion Coverage</div>';
var pcts=[
{label:"Discount Dish",val:parseFloat(ov.discountProductCoverage),color:"var(--green)"},
{label:"Full Discount (Fulfillment)",val:parseFloat(ov.fullDiscountCoverage),color:"var(--yellow)"}
];
for(var i=0;i<pcts.length;i++){var p=pcts[i];html+='<div class="pct-row"><div class="pct-label">'+p.label+'</div><div class="pct-bar-bg"><div class="pct-bar-fill" style="width:'+p.val+'%;background:'+p.color+'"></div></div><div class="pct-value" style="color:'+p.color+'">'+p.val.toFixed(1)+'%</div></div>';}
html+='<div style="margin-top:16px;font-size:11px;color:var(--muted);font-weight:600">Discount Dish Coverage — 7-Day Trend</div><div class="sparkline">';
for(var i=0;i<tr.length;i++){var ht=Math.round((tr[i].discountCoverage-55)/(70-55)*30);if(ht<2)ht=2;html+='<div class="sparkline-bar" style="height:'+ht+'px" title="'+tr[i].date+': '+tr[i].discountCoverage+'%"></div>';}
html+='</div>';
html+='</div>';
html+='</div>';

// Open shops trend
html+='<div class="two-col">';
html+='<div class="card"><div class="card-title">🏪 Active Shops — Last 7 Days</div><div class="chart-container"><div class="chart-bar-group">';
var maxS=0;for(var i=0;i<tr.length;i++){if(tr[i].openShops>maxS)maxS=tr[i].openShops}
for(var i=0;i<tr.length;i++){var t=tr[i];var ht=Math.round(t.openShops/maxS*130);html+='<div class="chart-bar-wrapper"><div class="chart-val">'+t.openShops+'</div><div class="chart-bar green" style="height:'+ht+'px"></div><div class="chart-label">'+t.date+'</div></div>';}
html+='</div></div></div>';

// Timeline
html+='<div class="card"><div class="card-title">📡 Activity Log</div><div class="timeline">';
for(var i=0;i<log.length;i++){var l=log[i];html+='<div class="timeline-item'+(l.type==='warn'?' warning':'')+'"><span class="timeline-time">'+l.time+'</span><span class="timeline-source">'+l.agent+'</span><span>'+l.msg+'</span></div>';}
html+='</div></div>';
html+='</div>';
html+='</section>';

// ===== SECTION: COMPETITION =====
html+='<section id="sec-competition">';
html+='<div class="card"><div class="card-title">🏆 Competition Leaderboard</div><p style="font-size:12px;color:var(--muted);margin-bottom:12px">Target: Individual ≥50 pts | Team avg ≥45 pts/BD | Sprint: '+comp.sprintDays+' | <strong style="color:var(--green)">FD Ipiranga avg 12.2 pts</strong> | <strong style="color:var(--red)">FC Liberdade avg 2.4 pts</strong></p><table class="data-table"><thead><tr><th>#</th><th>BD</th><th>Team</th><th>District</th><th>Total Pts</th><th>New Sign Pts</th><th>Recall Pts</th><th>Cooperating</th><th>Gap</th><th>Status</th></tr></thead><tbody>';
var sorted=bds.slice().sort(function(a,b){return b.earned-a.earned||b.potential-a.potential});
for(var i=0;i<sorted.length;i++){
var b=sorted[i];var gap=b.earned-50;var cls=b.earned>=20?'green':b.earned>=5?'yellow':'red';
var stText=b.earned>=20?'On Track':b.earned>=5?'Needs Push':'Critical';
html+='<tr class="row-'+cls+'"><td><strong>'+(i+1)+'</strong></td><td><strong>'+b.name+'</strong></td><td><span class="member-team-badge '+(b.team==='FD'?'badge-fd':'badge-fc')+'">'+b.team+'</span></td><td>'+(b.district||'-')+'</td><td><strong>'+b.earned+'</strong></td><td>'+(b.newsignPts||0)+'</td><td>'+(b.recallPts||0)+'</td><td>'+(b.cooperating||0)+'</td><td>'+gap+'</td><td><span class="status-badge '+cls+'">'+stText+'</span></td></tr>';
}
html+='</tbody></table></div>';

// Key merchants
html+='<div class="card"><div class="card-title">🏪 Key Merchants Tracker (High-Value)</div><table class="data-table"><thead><tr><th>Merchant</th><th>Points</th><th>BD Owner</th><th>Action Required</th><th>Risk</th></tr></thead><tbody>';
for(var i=0;i<km.length;i++){var m=km[i];html+='<tr><td><strong>'+m.name+'</strong></td><td><strong>'+m.points+'</strong></td><td>'+m.bd+'</td><td>'+m.action+'</td><td><span class="'+(m.risk==='critical'?'risk-extreme':'risk-high')+'">'+m.risk+'</span></td></tr>';}
html+='</tbody></table></div>';
html+='</section>';

// ===== SECTION: TEAM BD Detail =====
html+='<section id="sec-team">';
html+='<div class="card"><div class="card-title">👥 Team Performance — May 1–20</div><table class="data-table"><thead><tr><th>BD</th><th>Team</th><th>Active Shops</th><th>Txn Shops</th><th>Txn Rate</th><th>Orders MTD</th><th>Daily Avg</th><th>New Signs</th><th>Comp. Score</th></tr></thead><tbody>';
for(var i=0;i<sorted.length;i++){
var b=sorted[i];var txnRate=Math.round(b.txnShops/b.shops*100);var dailyOrd=Math.round(b.orders/20);
html+='<tr><td><strong>'+b.name+'</strong></td><td><span class="member-team-badge '+(b.team==='FD'?'badge-fd':'badge-fc')+'">'+b.team+'</span></td><td>'+b.shops+'</td><td>'+b.txnShops+'</td><td>'+txnRate+'%</td><td>'+b.orders.toLocaleString()+'</td><td>'+dailyOrd+'</td><td>'+b.newSigns+'</td><td><strong>'+b.earned+'</strong></td></tr>';
}
html+='</tbody></table></div>';

// Team member cards
html+='<div class="card"><div class="card-title">👥 Member Cards</div>';
var fdTeam=bds.filter(function(b){return b.team==='FD'});
var fcTeam=bds.filter(function(b){return b.team==='FC'});

html+='<div class="team-section"><div class="team-section-title">FD Team — Ipiranga ('+fdTeam.length+' BDs)</div><div class="team-grid">';
for(var i=0;i<fdTeam.length;i++){var m=fdTeam[i];var pct=Math.min(m.earned/50*100,100);var c=pct>=40?'green':pct>=14?'yellow':'red';
html+='<div class="member-card"><div class="member-avatar" style="background:'+getGrad(m.name)+'">'+m.name.charAt(0)+'</div><div class="member-name">'+m.name+'</div><span class="member-team-badge badge-fd">FD</span><div class="member-score">Score '+m.earned+' / Potential '+m.potential+'</div><div class="member-detail">Shops '+m.shops+' | Orders '+Math.round(m.orders/1000)+'k</div><div class="progress-bar"><div class="progress-fill '+c+'" style="width:'+pct+'%"></div></div><div class="member-status" style="color:var(--'+c+')">'+(pct>=40?'On Track':'Needs Push')+'</div></div>';}
html+='</div></div>';

html+='<div class="team-section"><div class="team-section-title fc">FC Team — Liberdade ('+fcTeam.length+' BDs)</div><div class="team-grid">';
for(var i=0;i<fcTeam.length;i++){var m=fcTeam[i];var pct=Math.min(m.earned/50*100,100);var c=pct>=40?'green':pct>=14?'yellow':'red';
html+='<div class="member-card"><div class="member-avatar" style="background:'+getGrad(m.name)+'">'+m.name.charAt(0)+'</div><div class="member-name">'+m.name+'</div><span class="member-team-badge badge-fc">FC</span><div class="member-score">Score '+m.earned+' / Potential '+m.potential+'</div><div class="member-detail">Shops '+m.shops+' | Orders '+Math.round(m.orders/1000)+'k</div><div class="progress-bar"><div class="progress-fill '+c+'" style="width:'+pct+'%"></div></div><div class="member-status" style="color:var(--'+c+')">'+(pct>=40?'On Track':'Needs Push')+'</div></div>';}
html+='</div></div>';
html+='</div>';
html+='</section>';

// ===== SECTION: PROMO =====
html+='<section id="sec-promo">';
html+='<div class="card"><div class="card-title">💰 Discount Coverage Analysis</div>';
html+='<div class="three-col">';
html+='<div class="stat-card"><div class="stat-label">Discount Dish Coverage</div><div class="stat-value green">'+ov.discountProductCoverage+'</div><div class="stat-sub">Target ≥70%</div></div>';
